services:
  app:
    image: php:8.5-cli
    container_name: flux-behat-app
    working_dir: /app
    command: php -d display_errors=0 -S 0.0.0.0:8000 -t /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
  chrome:
    image: registry.gitlab.com/behat-chrome/docker-chrome-headless:latest
    container_name: flux-behat-chrome
    depends_on:
      - app
    volumes:
      - .:/code
    command:
      - google-chrome-stable
      - --headless
      - --disable-gpu
      - --disable-dev-shm-usage
      - --disable-extensions
      - --no-sandbox
      - --remote-debugging-host=0.0.0.0
      - --remote-debugging-port=9222
