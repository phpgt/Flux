name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  actions: read

jobs:
  composer:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-php-8.5-${{ hashFiles('**/composer.lock') }}

      - name: Composer install
        uses: php-actions/composer@v6
        with:
          php_version: "8.5"

      - name: Install Node dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Archive build
        run: mkdir -p /tmp/github-actions && tar --exclude=".git" -cvf /tmp/github-actions/build.tar ./

      - name: Upload build archive for test runners
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-behat
          path: /tmp/github-actions
          retention-days: 1

  behat:
    runs-on: ubuntu-latest
    needs: [composer]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact-behat
          path: /tmp/github-actions

      - name: Extract build archive
        run: tar -xvf /tmp/github-actions/build.tar ./

      - name: Run Behat
        uses: php-actions/behat@chrome
        with:
          php_version: "8.5"
          vendored_behat_path: vendor/bin/behat
          app_command: php -d display_errors=0 -S 0.0.0.0:8000 -t /app
