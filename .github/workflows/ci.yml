name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  actions: read

jobs:
  composer:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-php-8.5-${{ hashFiles('**/composer.lock') }}

      - name: Composer install
        uses: php-actions/composer@v6
        with:
          php_version: "8.5"

      - name: Install Node dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Archive build
        run: mkdir -p /tmp/github-actions && tar --exclude=".git" -cvf /tmp/github-actions/build.tar ./

      - name: Upload build archive for test runners
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-behat
          path: /tmp/github-actions
          retention-days: 1

  behat:
    runs-on: ubuntu-latest
    needs: [composer]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact-behat
          path: /tmp/github-actions

      - name: Extract build archive
        run: tar -xvf /tmp/github-actions/build.tar ./

      - name: Start Behat services
        run: test/bin/behat-up

      - name: Start Chrome DevTools proxy
        run: docker exec -d flux-behat-chrome python3 /code/test/bin/chrome-devtools-proxy.py

      - name: Wait for app and Chrome proxy
        run: |
          set -euo pipefail
          for attempt in {1..50}; do
            if curl -fsS http://127.0.0.1:8000/example/01-counter.php >/dev/null; then
              break
            fi
            sleep 0.2
          done
          for attempt in {1..100}; do
            if curl -fsS http://127.0.0.1:9223/json/version >/dev/null; then
              break
            fi
            sleep 0.2
          done
          curl -fsS http://127.0.0.1:8000/example/01-counter.php >/dev/null
          curl -fsS http://127.0.0.1:9223/json/version >/dev/null

      - name: Run Behat
        uses: php-actions/behat@chrome
        with:
          php_version: "8.5"
          vendored_behat_path: vendor/bin/behat
          config: behat.yml.ci

      - name: Stop Behat services
        if: always()
        run: test/bin/behat-down
